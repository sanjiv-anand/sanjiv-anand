name: Update README Stats

on:
  schedule:
    # Runs once a day at 03:00 UTC. Adjust as you like.
    - cron: "0 3 * * *"
  workflow_dispatch: {}
  push:
    branches: [master]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate stats and update SVGs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_USERNAME: sanjiv-anand
        run: python generate_readme.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/dark_mode.svg assets/light_mode.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-update GitHub stats"
          git push
